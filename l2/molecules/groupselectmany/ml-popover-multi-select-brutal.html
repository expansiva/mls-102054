<div style="min-height:100vh; padding:2rem; background:#f5f5f5; font-family:'JetBrains Mono','SF Mono','Courier New',monospace;">
  <div style="max-width:32rem; margin:0 auto;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:900; color:#000; margin-bottom:0.5rem; text-transform:uppercase;">Popover Multi Select</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:#fff; color:#000; border:2px solid #000; font-size:0.875rem; font-weight:700;">groupSelectMany · brutalism · 102054</span>
    </header>

    <widget-playground-state-102020 state='{"playground":{"skills":{"value":"lit,ts"}}}'></widget-playground-state-102020>

    <article style="background:#fff; border:3px solid #000; padding:1.5rem; box-shadow:6px 6px 0 #000;">
      <groupselectmany--ml-popover-multi-select-brutal value="{{playground.skills.value}}" searchable max-selection="3">
        <Label>Habilidades (max. 3)</Label>
        <Helper>Clique para abrir e selecione varias</Helper>
        <Item value="lit">Lit</Item>
        <Item value="ts">TypeScript</Item>
        <Item value="less">LESS</Item>
        <Item value="a11y">Acessibilidade</Item>
        <Item value="design">Design Systems</Item>
        <Item value="legacy" disabled>Legacy (indisponivel)</Item>
      </groupselectmany--ml-popover-multi-select-brutal>
    </article>
  </div>
</div>
