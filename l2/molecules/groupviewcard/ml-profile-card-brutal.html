<div style="min-height:100vh; padding:2rem; background:#f5f5f5; font-family:'JetBrains Mono','SF Mono','Courier New',monospace;">
  <div style="max-width:48rem; margin:0 auto;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:900; color:#000; margin-bottom:0.5rem; text-transform:uppercase;">Profile Card</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:#fff; color:#000; border:2px solid #000; font-size:0.875rem; font-weight:700;">groupViewCard · brutalism · 102054</span>
    </header>

    <section style="display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem;">
      <groupviewcard--ml-profile-card-brutal>
        <CardTitle>Ada Lovelace</CardTitle>
        <CardDescription>Engenheira de software</CardDescription>
        <CardContent>Primeira programadora da historia, pioneira da computacao.</CardContent>
        <CardFooter>Membro desde 2021</CardFooter>
      </groupviewcard--ml-profile-card-brutal>

      <groupviewcard--ml-profile-card-brutal selected="true" clickable="true">
        <CardTitle>Alan Turing</CardTitle>
        <CardDescription>Matematico (selecionado)</CardDescription>
        <CardContent>Card clicavel e selecionado.</CardContent>
      </groupviewcard--ml-profile-card-brutal>

      <groupviewcard--ml-profile-card-brutal loading="true"></groupviewcard--ml-profile-card-brutal>
    </section>
  </div>
</div>
