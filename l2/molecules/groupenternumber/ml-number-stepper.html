<!-- Fundo rico = contrato de container do glassmorphism. -->
<div style="min-height:100vh; padding:2rem; background:linear-gradient(135deg,#0b1220 0%,#312e81 45%,#7e22ce 100%); background-attachment:fixed;">
  <div style="max-width:48rem; margin:0 auto; font-family:'Inter',system-ui,sans-serif;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:600; color:#fff; margin-bottom:0.5rem;">Number Stepper</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:9999px; font-size:0.875rem;">groupEnterNumber · glassmorphism</span>
    </header>

    <widget-playground-state-102020 state='{"playground":{"qty":{"value":2},"price":{"value":19.9}}}'></widget-playground-state-102020>

    <section style="display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1.5rem;">
      <article style="background:rgba(255,255,255,0.07); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:600; color:#fff; margin-bottom:1rem;">Quantidade</h3>
        <groupenternumber--ml-number-stepper value="{{playground.qty.value}}" min="0" max="10" step="1">
          <Label>Itens no carrinho</Label>
          <Helper>Máximo de 10</Helper>
        </groupenternumber--ml-number-stepper>
      </article>

      <article style="background:rgba(255,255,255,0.07); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:600; color:#fff; margin-bottom:1rem;">Preço (2 casas)</h3>
        <groupenternumber--ml-number-stepper value="{{playground.price.value}}" step="0.5" decimals="2" locale="pt-BR">
          <Label>Valor</Label>
          <Prefix>R$</Prefix>
        </groupenternumber--ml-number-stepper>
      </article>
    </section>
  </div>
</div>
