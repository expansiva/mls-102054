<div style="min-height:100vh; padding:2rem; background:#f5f5f5;">
  <div style="max-width:32rem; margin:0 auto; font-family:'JetBrains Mono','SF Mono','Courier New',monospace;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:900; color:#000; margin-bottom:0.5rem; text-transform:uppercase;">Floating Text Input</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:#fff; color:#000; border:3px solid #000; box-shadow:3px 3px 0 #000; font-size:0.875rem; text-transform:uppercase; font-weight:700;">groupEnterText · brutalism · 102054 (herança)</span>
    </header>

    <widget-playground-state-102020 state='{"playground":{"name":{"value":""},"user":{"value":"ada"}}}'></widget-playground-state-102020>

    <section style="display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem;">
      <article style="background:#fff; border:3px solid #000; box-shadow:3px 3px 0 #000; padding:1.5rem;">
        <groupentertext--ml-floating-text-input-brutal value="{{playground.name.value}}">
          <Label>Full name</Label>
          <Helper>As shown on your document</Helper>
        </groupentertext--ml-floating-text-input-brutal>
      </article>
      <article style="background:#fff; border:3px solid #000; box-shadow:3px 3px 0 #000; padding:1.5rem;">
        <groupentertext--ml-floating-text-input-brutal value="{{playground.user.value}}" error="Username already taken">
          <Label>Username</Label>
        </groupentertext--ml-floating-text-input-brutal>
      </article>
    </section>
  </div>
</div>
