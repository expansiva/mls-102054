<!-- Brutalism: flat white background, no gradients. -->
<div style="min-height:100vh; padding:2rem; background:#fff;">
  <div style="max-width:32rem; margin:0 auto; font-family:'JetBrains Mono','SF Mono','Courier New',monospace;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:700; color:#000; margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:0.05em;">Combobox</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:#000; color:#fff; border:3px solid #000; font-size:0.875rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">groupSelectOne / brutalism</span>
    </header>

    <aura--molecules--playground--widget-playground-state-102020 state='{"playground":{"country":{"value":"br"}}}'></aura--molecules--playground--widget-playground-state-102020>

    <article style="background:#fff; border:3px solid #000; box-shadow:4px 4px 0 #000; padding:1.5rem;">
      <groupselectone--ml-combobox-brutal value="{{playground.country.value}}" clearable>
        <Label>PAIS</Label>
        <Helper>Digite para filtrar</Helper>
        <Item value="br">Brasil</Item>
        <Item value="us">Estados Unidos</Item>
        <Item value="pt">Portugal</Item>
        <Item value="ar">Argentina</Item>
        <Item value="cl">Chile</Item>
        <Item value="uy" disabled>Uruguai (indisponivel)</Item>
      </groupselectone--ml-combobox-brutal>
    </article>
  </div>
</div>
