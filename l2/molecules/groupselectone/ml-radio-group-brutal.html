<!-- Brutalism: flat white background, no gradients. -->
<div style="min-height:100vh; padding:2rem; background:#fff;">
  <div style="max-width:64rem; margin:0 auto; font-family:'JetBrains Mono','SF Mono','Courier New',monospace;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:700; color:#000; margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:0.05em;">Radio Group</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:#000; color:#fff; border:3px solid #000; font-size:0.875rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">groupSelectOne / brutalism</span>
    </header>

    <widget-playground-state-102020 state='{"playground":{"basic":{"value":"standard"},"groups":{"value":""},"error":{"value":"","error":"Selecione um plano"},"disabled":{"value":"pro"},"viewmode":{"value":"standard"}}}'></widget-playground-state-102020>

    <section style="display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1.5rem; margin-bottom:2rem;">

      <article style="background:#fff; border:3px solid #000; box-shadow:4px 4px 0 #000; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:700; color:#000; margin-bottom:1rem; text-transform:uppercase; letter-spacing:0.05em;">Basic</h3>
        <demo id="demo-basic">
          <groupselectone--ml-radio-group-brutal value="{{playground.basic.value}}">
            <Label>PLANO</Label>
            <Helper>Escolha um plano</Helper>
            <Item value="free">Gratuito</Item>
            <Item value="standard">Standard</Item>
            <Item value="pro">Pro</Item>
            <Item value="enterprise" disabled>Enterprise (sob consulta)</Item>
          </groupselectone--ml-radio-group-brutal>
        </demo>
      </article>

      <article style="background:#fff; border:3px solid #000; box-shadow:4px 4px 0 #000; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:700; color:#000; margin-bottom:1rem; text-transform:uppercase; letter-spacing:0.05em;">Com grupos</h3>
        <demo id="demo-groups">
          <groupselectone--ml-radio-group-brutal value="{{playground.groups.value}}">
            <Label>ENTREGA</Label>
            <Group label="Padrao">
              <Item value="eco">Economica (7 dias)</Item>
              <Item value="normal">Normal (3 dias)</Item>
            </Group>
            <Group label="Expressa">
              <Item value="fast">Rapida (1 dia)</Item>
              <Item value="same">No mesmo dia</Item>
            </Group>
          </groupselectone--ml-radio-group-brutal>
        </demo>
      </article>

      <article style="background:#fff; border:3px solid #000; box-shadow:4px 4px 0 #000; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:700; color:#000; margin-bottom:1rem; text-transform:uppercase; letter-spacing:0.05em;">Erro (required)</h3>
        <demo id="demo-error">
          <groupselectone--ml-radio-group-brutal value="{{playground.error.value}}" error="{{playground.error.error}}" required="true">
            <Label>PLANO</Label>
            <Item value="free">Gratuito</Item>
            <Item value="pro">Pro</Item>
          </groupselectone--ml-radio-group-brutal>
        </demo>
      </article>

      <article style="background:#fff; border:3px solid #000; box-shadow:4px 4px 0 #000; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:700; color:#000; margin-bottom:1rem; text-transform:uppercase; letter-spacing:0.05em;">Disabled / View</h3>
        <demo id="demo-disabled">
          <groupselectone--ml-radio-group-brutal value="{{playground.disabled.value}}" disabled="true">
            <Label>PLANO</Label>
            <Item value="free">Gratuito</Item>
            <Item value="pro">Pro</Item>
          </groupselectone--ml-radio-group-brutal>
        </demo>
        <div style="margin-top:1rem;">
          <groupselectone--ml-radio-group-brutal value="{{playground.viewmode.value}}" is-editing="false">
            <Label>PLANO (VIEW)</Label>
            <Item value="standard">Standard</Item>
          </groupselectone--ml-radio-group-brutal>
        </div>
      </article>

    </section>
  </div>
</div>
