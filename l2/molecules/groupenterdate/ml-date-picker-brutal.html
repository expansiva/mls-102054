<div style="min-height:100vh; padding:2rem; background:#f5f5f5;">
  <div style="max-width:32rem; margin:0 auto; font-family:'JetBrains Mono','SF Mono','Courier New',monospace;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:900; color:#000; margin-bottom:0.5rem; text-transform:uppercase;">Date Picker</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:#fff; color:#000; border:3px solid #000; box-shadow:3px 3px 0 #000; font-size:0.875rem; text-transform:uppercase; font-weight:700;">groupEnterDate · brutalism · 102054 (herança)</span>
    </header>

    <aura--molecules--playground--widget-playground-state-102020 state='{"playground":{"date":{"value":""},"date2":{"value":"2025-06-15"}}}'></aura--molecules--playground--widget-playground-state-102020>

    <section style="display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem;">
      <article style="background:#fff; border:3px solid #000; box-shadow:3px 3px 0 #000; padding:1.5rem;">
        <groupenterdate--ml-date-picker-brutal value="{{playground.date.value}}">
          <Label>Birth date</Label>
          <Helper>Select your date of birth</Helper>
        </groupenterdate--ml-date-picker-brutal>
      </article>
      <article style="background:#fff; border:3px solid #000; box-shadow:3px 3px 0 #000; padding:1.5rem;">
        <groupenterdate--ml-date-picker-brutal value="{{playground.date2.value}}" error="Date is in the future">
          <Label>Event date</Label>
        </groupenterdate--ml-date-picker-brutal>
      </article>
    </section>
  </div>
</div>
