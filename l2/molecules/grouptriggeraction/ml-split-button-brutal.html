<div style="min-height:100vh; padding:2rem; background:#f5f5f5; font-family:'JetBrains Mono','SF Mono','Courier New',monospace;">
  <div style="max-width:48rem; margin:0 auto;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:900; color:#000; text-transform:uppercase;">Split Button</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:#fff; color:#000; border:2px solid #000; font-size:0.875rem; font-weight:700;">groupTriggerAction · brutalism · 102054</span>
    </header>
    <article style="background:#fff; border:3px solid #000; padding:1.5rem; box-shadow:6px 6px 0 #000;">
      <h3 style="font-size:1.125rem; font-weight:900; color:#000; margin-bottom:1rem; text-transform:uppercase;">Save with options</h3>
      <div style="display:flex; flex-wrap:wrap; gap:1rem; align-items:center;">
        <grouptriggeraction--ml-split-button-brutal>
          <Label value="save">Save</Label>
          <span value="save-new">Save and create new</span>
          <span value="save-copy">Save as copy</span>
          <span value="save-template" disabled>Save as template</span>
        </grouptriggeraction--ml-split-button-brutal>

        <grouptriggeraction--ml-split-button-brutal size="sm">
          <Label value="export">Export</Label>
          <span value="pdf">PDF</span>
          <span value="csv">CSV</span>
          <span value="xlsx">Excel</span>
        </grouptriggeraction--ml-split-button-brutal>

        <grouptriggeraction--ml-split-button-brutal disabled="true">
          <Label value="save">Disabled</Label>
          <span value="a">Option A</span>
        </grouptriggeraction--ml-split-button-brutal>
      </div>
    </article>
  </div>
</div>
